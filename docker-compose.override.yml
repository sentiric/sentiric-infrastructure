# docker-compose.override.yml - e2-micro için optimize edilmiş hali

services:
  postgres:
    mem_limit: 256m
    cpus: 0.3

  rabbitmq:
    mem_limit: 256m
    cpus: 0.3

  user-service:
    mem_limit: 200m
    cpus: 0.25

  dialplan-service:
    mem_limit: 200m
