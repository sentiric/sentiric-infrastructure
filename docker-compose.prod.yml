# ====================================================================
#          SENTIRIC PLATFORMU - ÜRETİM ORKESTRASYONU (v2.0 - Profil Tabanlı)
# ====================================================================
# Bu dosya, tüm servisleri tanımlar ve profiller aracılığıyla
# hangi servisin nerede çalışacağını yönetir.
# ====================================================================

networks:
  sentiric-net:
    name: ${NETWORK_NAME:-sentiric-net}
    driver: ${NETWORK_DRIVER:-bridge}

volumes:
  postgres_data:
  rabbitmq_data:

services:
  # ==================== VERİ KATMANI (DATA LAYER) ====================
  postgres:
    image: postgres:16-alpine
    container_name: sentiric_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    networks:
      - sentiric-net
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - "data" # Bu servis 'data' profilinde çalışır.

  rabbitmq:
    image: rabbitmq:4.1.0-management-alpine
    container_name: sentiric_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq/
    networks:
      - sentiric-net
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles:
      - "data" # Bu servis 'data' profilinde çalışır.

  # ==================== AĞ GEÇİTLERİ (TELEKOM LAYER) ====================
  sip-gateway:
    image: ghcr.io/sentiric/sentiric-sip-gateway-service:${TAG:-latest}
    container_name: sentiric_sip_gateway
    env_file: ./.env
    ports:
      - "${EXTERNAL_SIP_PORT}:5060/udp"
    networks:
      - sentiric-net
    restart: unless-stopped
    profiles:
      - "telekom" # Bu servis 'telekom' profilinde çalışır.

  sip-signaling:
    image: ghcr.io/sentiric/sentiric-sip-signaling-service:${TAG:-latest}
    container_name: sentiric_sip_signaling
    env_file: ./.env
    environment:
      - SIP_HOST=0.0.0.0
      - SIP_PORT=${INTERNAL_SIP_SIGNALING_PORT}
      - PUBLIC_IP=${PUBLIC_IP}
    networks:
      - sentiric-net
    restart: unless-stopped
    profiles:
      - "telekom" # Bu servis 'telekom' profilinde çalışır.

  media-service:
    image: ghcr.io/sentiric/sentiric-media-service:${TAG:-latest}
    container_name: sentiric_media_service
    env_file: ./.env
    environment:
      - PUBLIC_IP=${PUBLIC_IP}
    ports:
      - "${EXTERNAL_RTP_PORT_MIN:-10000}-${EXTERNAL_RTP_PORT_MAX:-10100}:${EXTERNAL_RTP_PORT_MIN:-10000}-${EXTERNAL_RTP_PORT_MAX:-10100}/udp"
      - "50052:50052"
    networks:
      - sentiric-net
    restart: unless-stopped
    profiles:
      - "telekom" # Bu servis 'telekom' profilinde çalışır.

  # ==================== UYGULAMA SERVİSLERİ (APP LAYER) ====================
  user-service:
    image: ghcr.io/sentiric/sentiric-user-service:${TAG:-latest}
    container_name: sentiric_user_service
    env_file: ./.env
    networks:
      - sentiric-net
    restart: unless-stopped
    profiles:
      - "app" # Bu servis 'app' profilinde çalışır.

  dialplan-service:
    image: ghcr.io/sentiric/sentiric-dialplan-service:${TAG:-latest}
    container_name: sentiric_dialplan_service
    env_file: ./.env
    networks:
      - sentiric-net
    restart: unless-stopped
    profiles:
      - "app" # Bu servis 'app' profilinde çalışır.

  agent-service:
    image: ghcr.io/sentiric/sentiric-agent-service:${TAG:-latest}
    container_name: sentiric_agent_service
    env_file: ./.env
    networks:
      - sentiric-net
    restart: unless-stopped
    profiles:
      - "app" # Bu servis 'app' profilinde çalışır.

  llm-service:
    image: ghcr.io/sentiric/sentiric-llm-service:${TAG:-latest}
    container_name: sentiric_llm_service
    env_file: ./.env
    networks:
      - sentiric-net
    restart: unless-stopped
    profiles:
      - "ai" # Bu servis 'ai' profilinde çalışır.