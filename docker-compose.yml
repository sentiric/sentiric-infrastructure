networks:
  sentiric-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: sentiric_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sentiric-net
    ports:
      - "5432:5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sentiric_redis
    volumes:
      - redis_data:/data
    networks:
      - sentiric-net
    ports:
      - "6379:6379"
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: sentiric_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq/
    networks:
      - sentiric-net
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: always
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  user-service:
    container_name: sentiric_user_service
    build:
      context: ../sentiric-user-service
    networks:
      - sentiric-net
    environment:
      - PORT=3001
    restart: always
    # Express servisleri için healthcheck eklenmedi çünkü henüz /health endpoint'leri yok.
    # Onları da eklediğimizde buraya healthcheck'lerini koyacağız.

  dialplan-service:
    container_name: sentiric_dialplan_service
    build:
      context: ../sentiric-dialplan-service
    networks:
      - sentiric-net
    environment:
      - PORT=3002
    restart: always

  media-service:
    container_name: sentiric_media_service
    build:
      context: ../sentiric-media-service
    networks:
      - sentiric-net
    ports:
      - "10000-10100:10000-10100/udp"
    environment:
      - PORT=3003
      - PUBLIC_IP=${PUBLIC_IP}
      - RTP_PORT_MIN=10000
      - RTP_PORT_MAX=10100
    restart: always

  agent-service:
    container_name: sentiric_agent_service
    build:
      context: ../sentiric-agent-service
    env_file:
      - ../sentiric-agent-service/.env
    networks:
      - sentiric-net
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy # RabbitMQ "healthy" olana kadar bekle.
    healthcheck:
      # FastAPI sunucusunun /health endpoint'ini test et.
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s # Konteynerin başlaması için 15 saniye bekle.

  sip-signaling:
    container_name: sentiric_sip_signaling
    build:
      context: ../sentiric-sip-signaling-service
    env_file:
      - ../sentiric-sip-signaling-service/.env
    networks:
      - sentiric-net
    ports:
      - "${SIP_PORT}:${SIP_PORT}/udp"
    environment:
      - SIP_PORT=${SIP_PORT}
    restart: always
    depends_on:
      # Artık bu servislerin sadece başlamasını değil, "sağlıklı" olmasını bekleyebiliriz.
      # Ancak Express servislerinde henüz healthcheck olmadığı için bu şimdilik devre dışı.
      - user-service
      - dialplan-service
      - media-service
      - rabbitmq
      - agent-service # Agent'ın da sağlıklı olmasını bekleyebiliriz.