# docker-compose.yml

# This main file orchestrates the entire platform by including components.
# Each service's docker-compose.service.yml lives in its own repository,
# making the system modular and easy to manage.

# services:
#   # Service definitions are automatically included from the files below.
#   # This section is intentionally left empty for clarity.

networks:
  sentiric-net:
    name: ${NETWORK_NAME:-sentiric-net}
    driver: bridge

volumes:
  postgres_data:
  rabbitmq_data:
  # redis_data: # Uncomment when Redis is added to base-services.yml

include:
  # 1. Core Infrastructure Services
  - ./compose/base-services.yml

  # 2. Core Backend Services
  - ../sentiric-sip-signaling-service/docker-compose.service.yml
  - ../sentiric-media-service/docker-compose.service.yml
  - ../sentiric-user-service/docker-compose.service.yml
  - ../sentiric-dialplan-service/docker-compose.service.yml
  - ../sentiric-agent-service/docker-compose.service.yml