

networks:
  sentiric-net:
    name: ${NETWORK_NAME:-sentiric-net}
    driver: ${NETWORK_DRIVER:-bridge}

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
  mongodb_data:

services:
  # ==================== CORE INFRA ====================
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sentiric-net
    ports:
      - "5432:5432"      
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
    profiles: ["data", "default"]

  rabbitmq:
    image: rabbitmq:4.1.0-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - sentiric-net
    ports:
      - "5672:5672"
      - "15672:15672"      
    profiles: ["data", "default"]

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - sentiric-net
    ports:
      - "6379:6379"         
    profiles: ["data", "default"]

  mongodb:
    image: mongo:6.0.25-jammy
    volumes:
      - mongodb_data:/data/db
    networks:
      - sentiric-net
    ports:
      - "27017:27017"         
    profiles: ["data", "default"]

  # ==================== TELECOM SERVICES ====================
  sip-signaling:
    build: ../sentiric-sip-signaling-service
    # env_file kullanmak yerine, docker-compose ana .env'yi otomatik yükler
    # environment bölümü .env'deki değerleri doğrudan kullanır.
    environment:
      - SIP_HOST=${SIP_HOST}
      - SIP_PORT=${SIP_PORT}
      - PUBLIC_IP=${PUBLIC_IP}
      - USER_SERVICE_GRPC_URL=${USER_SERVICE_GRPC_URL}
      - DIALPLAN_SERVICE_GRPC_URL=${DIALPLAN_SERVICE_GRPC_URL}
      - MEDIA_SERVICE_GRPC_URL=${MEDIA_SERVICE_GRPC_URL}
      - RABBITMQ_URL=${RABBITMQ_URL}
    ports:
      - "${SIP_PORT}:${SIP_PORT}/udp"
    networks:
      - sentiric-net
    restart: always

  media-service:
    build: ../sentiric-media-service
    environment:
      RTP_PORTS: "${RTP_PORT_MIN}-${RTP_PORT_MAX}"
      GRPC_PORT: ${GRPC_PORT_MEDIA}
    ports:
      - "${RTP_PORT_MIN}-${RTP_PORT_MAX}:${RTP_PORT_MIN}-${RTP_PORT_MAX}/udp"
    networks:
      - sentiric-net
    profiles: ["telekom", "default"]

  # ==================== APP SERVICES ====================
  user-service:
    build: ../sentiric-user-service
    environment:
      DB_URL: ${POSTGRES_URL}
      GRPC_PORT: ${GRPC_PORT_USER}
    networks:
      - sentiric-net
    ports:
      - "${GRPC_PORT_USER}:${GRPC_PORT_USER}"        
    profiles: ["app", "default"]

  dialplan-service:
    build: ../sentiric-dialplan-service
    environment:
      DB_URL: ${POSTGRES_URL}
      REDIS_URL: ${REDIS_URL}
    networks:
      - sentiric-net
    ports:
      - "${GRPC_PORT_DIALPLAN}:${GRPC_PORT_DIALPLAN}"          
    profiles: ["app", "default"]

  agent-service:
    build: ../sentiric-agent-service
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL}
      MONGO_URL: ${MONGO_URL}
    networks:
      - sentiric-net
    profiles: ["app", "default"]

