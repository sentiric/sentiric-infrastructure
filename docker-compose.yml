version: '3.9'

networks:
  sentiric-net:
    name: ${NETWORK_NAME:-sentiric-net}
    driver: ${NETWORK_DRIVER:-bridge}

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
  mongodb_data:

services:
  # ==================== VERİ KATMANI (DATA LAYER) ====================
  postgres:
    image: postgres:16-alpine
    container_name: sentiric_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    networks:
      - sentiric-net
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - "data"
      - "default"

  rabbitmq:
    image: rabbitmq:4.1.0-management-alpine # Versiyon güncellendi
    container_name: sentiric_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq/
    networks:
      - sentiric-net
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles:
      - "data"
      - "default"

  # redis:
  #   image: redis:7-alpine # Geri eklendi
  #   container_name: sentiric_redis
  #   volumes:
  #     - redis_data:/data
  #   networks:
  #     - sentiric-net
  #   ports:
  #     - "6379:6379"
  #   restart: unless-stopped
  #   profiles:
  #     - "data"
  #     - "default"

  # mongodb:
  #   image: mongo:6.0.25-jammy # Geri eklendi
  #   container_name: sentiric_mongodb
  #   volumes:
  #     - mongodb_data:/data/db
  #   networks:
  #     - sentiric-net
  #   ports:
  #     - "27017:27017"
  #   restart: unless-stopped
  #   profiles:
  #     - "data"
  #     - "default"

  # ==================== AĞ GEÇİTLERİ (TELEKOM LAYER) ====================
  sip-signaling:
    build: ../sentiric-sip-signaling-service
    container_name: sentiric_sip_signaling
    environment:
      - SIP_HOST=0.0.0.0
      - SIP_PORT=${SIP_PORT}
      - PUBLIC_IP=${PUBLIC_IP}
      - USER_SERVICE_GRPC_URL=${USER_SERVICE_GRPC_URL}
      - DIALPLAN_SERVICE_GRPC_URL=${DIALPLAN_SERVICE_GRPC_URL}
      - MEDIA_SERVICE_GRPC_URL=${MEDIA_SERVICE_GRPC_URL}
      - RABBITMQ_URL=${RABBITMQ_URL}
    ports:
      - "${SIP_PORT}:${SIP_PORT}/udp"
    networks:
      - sentiric-net
    restart: unless-stopped
    profiles:
      - "telekom"
      - "default"

  media-service:
    build: ../sentiric-media-service
    container_name: sentiric_media_service
    environment:
      - GRPC_PORT=${GRPC_PORT_MEDIA}
      - RTP_PORT_MIN=${RTP_PORT_MIN}
      - RTP_PORT_MAX=${RTP_PORT_MAX}
      - RTP_HOST=0.0.0.0
    ports:
      - "${RTP_PORT_MIN}-${RTP_PORT_MAX}:${RTP_PORT_MIN}-${RTP_PORT_MAX}/udp"
    networks:
      - sentiric-net
    restart: unless-stopped
    profiles:
      - "telekom"
      - "default"

  # ==================== UYGULAMA SERVİSLERİ (APP LAYER) ====================
  user-service:
    build: ../sentiric-user-service
    container_name: sentiric_user_service
    environment:
      - DATABASE_URL=${POSTGRES_URL}
      - GRPC_PORT=${GRPC_PORT_USER}
    networks:
      - sentiric-net
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - "app"
      - "default"

  dialplan-service:
    build: ../sentiric-dialplan-service
    container_name: sentiric_dialplan_service
    environment:
      - DATABASE_URL=${POSTGRES_URL}
      - GRPC_PORT=${GRPC_PORT_DIALPLAN}
    networks:
      - sentiric-net
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - "app"
      - "default"

  agent-service:
    build: ../sentiric-agent-service
    container_name: sentiric_agent_service
    environment:
      - RABBITMQ_URL=${RABBITMQ_URL}
    networks:
      - sentiric-net
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    profiles:
      - "app"
      - "default"