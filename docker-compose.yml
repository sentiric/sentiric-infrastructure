

networks:
  sentiric-net:
    name: ${NETWORK_NAME:-sentiric-net}
    driver: ${NETWORK_DRIVER:-bridge}

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
  mongodb_data:

services:
  # ==================== CORE INFRA ====================
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sentiric-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
    profiles: ["data", "default"]

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - sentiric-net
    profiles: ["data", "default"]

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - sentiric-net
    profiles: ["data", "default"]

  mongodb:
    image: mongo:6
    volumes:
      - mongodb_data:/data/db
    networks:
      - sentiric-net
    profiles: ["data", "default"]

  # ==================== TELECOM SERVICES ====================
  sip-signaling:
    build: ../sentiric-sip-signaling-service
    environment:
      SIP_HOST: ${SIP_HOST}
      SIP_PORT: ${SIP_PORT}
      PUBLIC_IP: ${PUBLIC_IP}
      USER_SERVICE_URL: ${USER_SERVICE_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
    ports:
      - "${SIP_PORT}:${SIP_PORT}/udp"
    networks:
      - sentiric-net
    profiles: ["telekom", "default"]

  media-service:
    build: ../sentiric-media-service
    environment:
      RTP_PORTS: "${RTP_PORT_MIN}-${RTP_PORT_MAX}"
      GRPC_PORT: ${MEDIA_GRPC_PORT}
    ports:
      - "${RTP_PORT_MIN}-${RTP_PORT_MAX}:${RTP_PORT_MIN}-${RTP_PORT_MAX}/udp"
    networks:
      - sentiric-net
    profiles: ["telekom", "default"]

  # ==================== APP SERVICES ====================
  user-service:
    build: ../sentiric-user-service
    environment:
      DB_URL: ${POSTGRES_URL}
      GRPC_PORT: ${USER_GRPC_PORT}
    networks:
      - sentiric-net
    profiles: ["app", "default"]

  dialplan-service:
    build: ../sentiric-dialplan-service
    environment:
      DB_URL: ${POSTGRES_URL}
      REDIS_URL: ${REDIS_URL}
    networks:
      - sentiric-net
    profiles: ["app", "default"]

  agent-service:
    build: ../sentiric-agent-service
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL}
      MONGO_URL: ${MONGO_URL}
    networks:
      - sentiric-net
    profiles: ["app", "default"]

  # ==================== NEW SERVICES ====================
  analytics-service:
    build: ../sentiric-analytics-service
    environment:
      MONGO_URL: ${MONGO_URL}
      REDIS_URL: ${REDIS_URL}
    networks:
      - sentiric-net
    profiles: ["app", "default"]

  notification-service:
    build: ../sentiric-notification-service
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL}
    networks:
      - sentiric-net
    profiles: ["app", "default"]