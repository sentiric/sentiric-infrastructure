networks:
  sentiric-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

services:
  # --- KATMAN 1: Temel Altyapı Servisleri (Önce bunlar sağlıklı olmalı) ---
  postgres:
    image: postgres:16-alpine
    container_name: sentiric_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sentiric-net
    ports:
      - "5432:5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sentiric_redis
    volumes:
      - redis_data:/data
    networks:
      - sentiric-net
    ports:
      - "6379:6379"
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: sentiric_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq/
    networks:
      - sentiric-net
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: always
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # --- KATMAN 2: Bağımsız Uygulama Servisleri ---
  user-service:
    container_name: sentiric_user_service
    image: ghcr.io/sentiric/sentiric-user-service:latest
    networks:
      - sentiric-net
    environment:
      - PORT=3001
    restart: always
    # Henüz healthcheck'i yok, bu yüzden sadece altyapının başlamasını beklesin.
    depends_on:
      - postgres

  dialplan-service:
    container_name: sentiric_dialplan_service
    image: ghcr.io/sentiric/sentiric-dialplan-service:latest
    networks:
      - sentiric-net
    environment:
      - PORT=3002
    restart: always
    depends_on:
      - postgres

  media-service:
    container_name: sentiric_media_service
    image: ghcr.io/sentiric/sentiric-media-service:latest
    networks:
      - sentiric-net
    ports:
      - "10000-10100:10000-10100/udp"
    environment:
      - PORT=3003
      - PUBLIC_IP=${PUBLIC_IP}
      - RTP_PORT_MIN=10000
      - RTP_PORT_MAX=10100
    restart: always

  # --- KATMAN 3: Akıllı Servisler (RabbitMQ sağlıklı olunca başlar) ---
  agent-service:
    container_name: sentiric_agent_service
    image: ghcr.io/sentiric/sentiric-agent-service:latest
    env_file:
      - ../sentiric-agent-service/.env
    networks:
      - sentiric-net
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      # Kendi Python script'imizi çalıştırıyoruz.
      test: ["CMD", "python", "healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # --- KATMAN 4: Dış Dünya Kapısı (Her şey sağlıklı olunca başlar) ---
  sip-signaling:
    container_name: sentiric_sip_signaling
    image: ghcr.io/sentiric/sentiric-sip-signaling-service:latest
    env_file:
      - ../sentiric-sip-signaling-service/.env
    networks:
      - sentiric-net
    ports:
      - "${SIP_PORT}:${SIP_PORT}/udp"
    environment:
      - SIP_PORT=${SIP_PORT}
    restart: always
    depends_on:
      agent-service:
        condition: service_healthy
      user-service:
        condition: service_started
      dialplan-service:
        condition: service_started
      media-service:
        condition: service_started