# sentiric-infrastructure/docker-compose.yml

networks:
  sentiric-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: sentiric_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sentiric-net
    ports:
      - "5432:5432"
    restart: always

  redis:
    image: redis:7-alpine
    container_name: sentiric_redis
    volumes:
      - redis_data:/data
    networks:
      - sentiric-net
    ports:
      - "6379:6379"
    restart: always

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: sentiric_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq/
    networks:
      - sentiric-net
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: always

  sip-signaling:
    container_name: sentiric_sip_signaling
    build:
      context: ../sentiric-sip-signaling-service
    # YENİ EKLENDİ: Servisin kendi .env dosyasını okumasını sağlar.
    env_file:
      - ../sentiric-sip-signaling-service/.env
    networks:
      - sentiric-net
    ports:
      - "${SIP_PORT}:${SIP_PORT}/udp"
    environment:
      # Bu değişken docker-compose'un kendi .env dosyasından gelir.
      - SIP_PORT=${SIP_PORT}
    restart: always
    # YENİ EKLENDİ: Bu servis, diğer iki servisin başlamasını bekler.
    depends_on:
      - user-service
      - dialplan-service

  user-service:
    container_name: sentiric_user_service
    build:
      context: ../sentiric-user-service
    networks:
      - sentiric-net
    # Bu servisin dış dünyaya açılmasına gerek yok, sadece diğer servisler erişecek.
    # ports:
    #   - "3001:3001"
    environment:
      - PORT=3001
    restart: always

  dialplan-service:
    container_name: sentiric_dialplan_service
    build:
      context: ../sentiric-dialplan-service
    networks:
      - sentiric-net
    environment:
      - PORT=3002
    restart: always