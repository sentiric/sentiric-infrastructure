# ANA ORKESTRATÖR: Bu dosya tüm platformu bir araya getirir.
version: '3.8'

# Tüm servis tanımlarını kendi repolarından ve temel altyapı dosyasından içe aktar.
include:
  # Temel Altyapı Servisleri (Postgres, Redis, RabbitMQ)
  - ./compose/base-services.yml

  # Tüm Uygulama ve Ağ Geçidi Servisleri
  - ../sentiric-agent-service/docker-compose.service.yml
  - ../sentiric-api-gateway-service/docker-compose.service.yml
  - ../sentiric-cdr-service/docker-compose.service.yml
  - ../sentiric-connectors-service/docker-compose.service.yml
  - ../sentiric-dashboard-ui/docker-compose.service.yml
  - ../sentiric-dialplan-service/docker-compose.service.yml
  - ../sentiric-knowledge-service/docker-compose.service.yml
  - ../sentiric-marketplace-service/docker-compose.service.yml
  - ../sentiric-media-service/docker-compose.service.yml
  - ../sentiric-messaging-gateway-service/docker-compose.service.yml
  - ../sentiric-sip-gateway-service/docker-compose.service.yml
  - ../sentiric-sip-signaling-service/docker-compose.service.yml
  - ../sentiric-stt-service/docker-compose.service.yml
  - ../sentiric-task-service/docker-compose.service.yml
  - ../sentiric-telephony-gateway-service/docker-compose.service.yml
  - ../sentiric-tts-service/docker-compose.service.yml
  - ../sentiric-user-service/docker-compose.service.yml
  - ../sentiric-web-agent-ui/docker-compose.service.yml

networks:
  sentiric-net:
    name: sentiric-net
    driver: bridge