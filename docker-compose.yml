# docker-compose.yml

networks:
  sentiric-net:
    name: ${NETWORK_NAME:-sentiric-net}
    driver: bridge

volumes:
  postgres_data:
  rabbitmq_data:

services:
  # VERİ KATMANI
  postgres:
    image: postgres:16-alpine
    env_file:
      - ./.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    # ports:
    #   - "${POSTGRES_DB_PORT}:${POSTGRES_DB_PORT}"
    networks:
      - sentiric-net
    profiles:
      - default
      - data
    restart: always

  rabbitmq:
    image: rabbitmq:4.1.0-management-alpine
    env_file:
      - ./.env
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq/
    # ports:
    #   - "${RABBITMQ_PORT}:${RABBITMQ_PORT}"
    #   - "15672:15672"
    networks:
      - sentiric-net
    profiles:
      - default
      - data
    restart: always

  # UYGULAMA SERVİSLERİ
  user-service:
    build:
      context: ../sentiric-user-service
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: sentiric-user-service
    env_file:
      - ./.env
    volumes:
      - ./tls/certs:/etc/sentiric/tls:ro
    # ports:
    #   - "${USER_SERVICE_GRPC_PORT}:${USER_SERVICE_GRPC_PORT}"
    networks:
      - sentiric-net
    profiles:
      - default
      - app
    restart: always

  agent-service:
    build:
      context: ../sentiric-agent-service
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: sentiric-agent-service
    env_file:
      - ./.env
    volumes:
      - ./tls/certs:/etc/sentiric/tls:ro
    # ports:
    #   - "${AGENT_SERVICE_GRPC_PORT}:${AGENT_SERVICE_GRPC_PORT}"
    networks:
      - sentiric-net
    profiles:
      - default
      - app
    restart: always

  dialplan-service:
    build:
      context: ../sentiric-dialplan-service
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: sentiric-dialplan-service
    env_file:
      - ./.env
    volumes:
      - ./tls/certs:/etc/sentiric/tls:ro
    # ports:
    #   - "${DIALPLAN_SERVICE_GRPC_PORT}:${DIALPLAN_SERVICE_GRPC_PORT}"
    networks:
      - sentiric-net
    profiles:
      - default
      - app
    restart: always

  media-service:
    build:
      context: ../sentiric-media-service
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: sentiric-media-service
    env_file:
      - ./.env
    volumes:
      - ./tls/certs:/etc/sentiric/tls:ro
    ports:
      - "${RTP_SERVICE_PORT_MIN:-10000}-${RTP_SERVICE_PORT_MAX:-10100}:${RTP_SERVICE_PORT_MIN:-10000}-${RTP_SERVICE_PORT_MAX:-10100}/udp"
      # - "${MEDIA_SERVICE_GRPC_PORT}:${MEDIA_SERVICE_GRPC_PORT}"
    networks:
      - sentiric-net
    profiles:
      - default
      - telekom
    restart: always

  # AĞ GEÇİTLERİ
  sip-signaling:
    build:
      context: ../sentiric-sip-signaling-service
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: sentiric-sip-signaling-service
    env_file:
      - ./.env
    volumes:
      - ./tls/certs:/etc/sentiric/tls:ro
    # ports:
    #   - "${SIP_SIGNALING_SERVICE_PORT}:${SIP_SIGNALING_SERVICE_PORT}"
    networks:
      - sentiric-net
    profiles:
      - default
      - telekom
    restart: always

  sip-gateway:
    build:
      context: ../sentiric-sip-gateway-service
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: sentiric-sip-gateway-service
    env_file:
      - ./.env
    # volumes:
    #   - ./tls/certs:/etc/sentiric/tls:ro
    ports:
      - "5060:${SIP_GATEWAY_SERVICE_PORT}/udp"
    networks:
      - sentiric-net
    profiles:
      - default
      - telekom
    restart: always

  # AI SERVİSLERİ
  llm-service:
    build:
      context: ../sentiric-llm-service
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: sentiric-llm-service
    env_file:
      - ./.env
    # volumes:
    #   - ./tls/certs:/etc/sentiric/tls:ro
    # ports:
    #   - "${LLM_SERVICE_PORT}:${LLM_SERVICE_PORT}"
    networks:
      - sentiric-net
    profiles:
      - default
      - ai
    restart: always
