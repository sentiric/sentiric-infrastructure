# docker-compose.yml (Güncellenmiş Hali)

networks:
  sentiric-net:
    name: ${NETWORK_NAME:-sentiric-net}
    driver: bridge

volumes:
  postgres_data:
  rabbitmq_data:

services:
  # VERİ KATMANI
  postgres:
    image: postgres:16-alpine
    env_file:
      - ./.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    # ports:
    #   - "${POSTGRES_DB_PORT}:${POSTGRES_DB_PORT}"      
    networks:
      - sentiric-net
    profiles:
      - default
      - data
    restart: always
    # YENİ EKLENEN KISIM
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4.1.0-management-alpine
    env_file:
      - ./.env
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq/
    # ports:
    #   - "${RABBITMQ_PORT}:${RABBITMQ_PORT}"
    #   - "15672:15672"      
    networks:
      - sentiric-net
    profiles:
      - default
      - data
    restart: always
    # YENİ EKLENEN KISIM
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # UYGULAMA SERVİSLERİ
  user-service:
    build:
      context: ../sentiric-user-service
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: sentiric-user-service
    env_file:
      - ./.env
    volumes:
      - ./tls/certs:/etc/sentiric/tls:ro
    # ports:
    #   - "${USER_SERVICE_GRPC_PORT}:${USER_SERVICE_GRPC_PORT}"
    networks:
      - sentiric-net
    profiles:
      - default
      - app
    restart: always
    # YENİ EKLENEN KISIM
    depends_on:
      postgres:
        condition: service_healthy

  agent-service:
    build:
      context: ../sentiric-agent-service
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: sentiric-agent-service
    env_file:
      - ./.env
    volumes:
      - ./tls/certs:/etc/sentiric/tls:ro
    # ports:
    #   - "${AGENT_SERVICE_GRPC_PORT}:${AGENT_SERVICE_GRPC_PORT}"
    networks:
      - sentiric-net
    profiles:
      - default
      - app
    restart: always
    # YENİ EKLENEN KISIM
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  dialplan-service:
    build:
      context: ../sentiric-dialplan-service
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: sentiric-dialplan-service
    env_file:
      - ./.env
    volumes:
      - ./tls/certs:/etc/sentiric/tls:ro
    # ports:
    #   - "${DIALPLAN_SERVICE_GRPC_PORT}:${DIALPLAN_SERVICE_GRPC_PORT}"
    networks:
      - sentiric-net
    profiles:
      - default
      - app
    restart: always
    # YENİ EKLENEN KISIM
    depends_on:
      postgres:
        condition: service_healthy

  media-service:
    build:
      context: ../sentiric-media-service
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: sentiric-media-service
    env_file:
      - ./.env
    volumes:
      - ./tls/certs:/etc/sentiric/tls:ro
    ports:
      - "${RTP_SERVICE_PORT_MIN:-10000}-${RTP_SERVICE_PORT_MAX:-10100}:${RTP_SERVICE_PORT_MIN:-10000}-${RTP_SERVICE_PORT_MAX:-10100}/udp"
      # - "${MEDIA_SERVICE_GRPC_PORT}:${MEDIA_SERVICE_GRPC_PORT}"
    networks:
      - sentiric-net
    profiles:
      - default
      - telekom
    restart: always
    # YENİ EKLENEN KISIM
    depends_on:
      user-service:
        condition: service_started # media-service'in DB'ye direkt bağımlılığı yok, user-service'in başlaması yeterli
      dialplan-service:
        condition: service_started

  # AĞ GEÇİTLERİ
  sip-signaling:
    build:
      context: ../sentiric-sip-signaling-service
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: sentiric-sip-signaling
    env_file:
      - ./.env
    volumes:
      - ./tls/certs:/etc/sentiric/tls:ro
    # ports:
    #   - "${SIP_SIGNALING_SERVICE_PORT}:${SIP_SIGNALING_SERVICE_PORT}"
    networks:
      - sentiric-net
    profiles:
      - default
      - telekom
    restart: always
    # YENİ EKLENEN KISIM
    depends_on:
      rabbitmq:
        condition: service_healthy
      user-service:
        condition: service_started
      dialplan-service:
        condition: service_started
      media-service:
        condition: service_started

  sip-gateway:
    build:
      context: ../sentiric-sip-gateway-service
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: sentiric-sip-gateway
    env_file:
      - ./.env
    # volumes:
    #   - ./tls/certs:/etc/sentiric/tls:ro
    ports:
      - "5060:${SIP_GATEWAY_SERVICE_PORT}/udp"
    networks:
      - sentiric-net
    profiles:
      - default
      - telekom
    restart: always
    # YENİ EKLENEN KISIM
    depends_on:
      sip-signaling:
        condition: service_started

  # AI SERVİSLERİ
  llm-service:
    build:
      context: ../sentiric-llm-service
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: sentiric-llm-service
    env_file:
      - ./.env
    # volumes:
    #   - ./tls/certs:/etc/sentiric/tls:ro
    # ports:
    #   - "${LLM_SERVICE_PORT}:${LLM_SERVICE_PORT}"
    networks:
      - sentiric-net
    profiles:
      - default
      - ai
    restart: always
    # YENİ EKLENEN KISIM (LLM'in bir bağımlılığı yok, ama en son başlaması mantıklı)
    depends_on:
      agent-service:
        condition: service_started